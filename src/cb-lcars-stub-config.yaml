lcards-label-card:
  enable_resize_observer: true
  lcards_card_type: lcards-label-picard-square
  show_label: true
  variables:
    label: "LCARS Label"
  tap_action:
    action: none
  double_tap_action:
    action: none
  hold_action:
    action: none
lcards-button-card:
  lcards_card_type: lcards-button-picard
  show_label: true
  variables:
    label: "LCARS Button"
  tap_action:
    action: toggle
  double_tap_action:
    action: none
  hold_action:
    action: more-info
lcards-elbow-card:
  lcards_card_type: lcards-header
  enable_resize_observer: true
  tap_action:
    action: none
  double_tap_action:
    action: none
  hold_action:
    action: none
lcards-dpad-card:
  enable_resize_observer: true
lcards-multimeter-card:
  template:
    - lcards-animation-geo-array
  enable_resize_observer: true
  variables:
    entity_match_header: false
    entity_match_slider: false
    entity_match_gauge: false
    entity_match_slider_start: false
    entity_match_slider_end: false
    _mode: gauge
    _vertical: false
    _slider_mode: brightness
    gauge:
      sub_meter:
        show_sub_meter: true
      range:
        enabled: true
    slider_track:
      bar_thickness: 10
      gap: 5
      bar_border_radius: 0
    animation:
      geo_array:
        animation_axis: col
        grid:
          num_cols: 3
          num_rows: 1
  tap_action:
    action: toggle
  double_tap_action:
    action: none
  hold_action:
    action: none
  show_label: false
lcards-msd-card:
  enable_resize_observer: true
  variables:
    card:
      border:
        left:
          size: 0
        right:
          size: 0
        top:
          size: 0
        bottom:
          size: 0
    msd:
      base_svg: builtin:ncc-1701-blue
  tap_action:
    action: none
  double_tap_action:
    action: none
  hold_action:
    action: none
