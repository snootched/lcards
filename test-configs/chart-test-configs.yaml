# LCARdS Chart Card Test Configurations
# v1.18.0+ Nested Structure ONLY (Breaking Change)
# NO backward compatibility with flat snake_case properties

# ============================================================================
# Test 1: Basic line chart
# ============================================================================
test_basic_line:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: line
  height: 300

# ============================================================================
# Test 2: Full nested structure
# ============================================================================
test_area_nested:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: area
  height: 400
  style:
    colors:
      series: ["#FF9900"]
      fill: ["rgba(255, 153, 0, 0.3)"]
    stroke:
      width: 2
      curve: smooth
    markers:
      size: 4
      stroke:
        width: 2
    formatters:
      xaxis_label: "HH:mm"
      yaxis_label: "{value}°C"
      tooltip: "{x|MMM DD HH:mm}: {y}°C"

# ============================================================================
# Test 3: Multi-series
# ============================================================================
test_multi_series:
  type: custom:lcards-chart
  sources: [sensor.indoor_temp, sensor.outdoor_temp]
  series_names: ["Indoor", "Outdoor"]
  chart_type: line
  height: 300
  show_legend: true
  style:
    colors:
      series: ["#FF9900", "#99CCFF"]
    stroke:
      width: 2
    markers:
      size: 4
    legend:
      show: true
      position: bottom

# ============================================================================
# Test 4: Bar chart with gradient
# ============================================================================
test_bar_gradient:
  type: custom:lcards-chart
  source: sensor.daily_energy
  chart_type: bar
  height: 300
  style:
    colors:
      series: ["#FF9900"]
    fill:
      type: gradient
      opacity: 0.8
      gradient:
        shade: dark
        type: vertical

# ============================================================================
# Test 5: Theme tokens
# ============================================================================
test_theme_tokens:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: line
  height: 300
  style:
    colors:
      series: ["theme:colors.primary.orange"]
      grid: "theme:colors.ui.border"
      marker:
        fill: ["theme:colors.primary.orange"]
        stroke: ["theme:colors.ui.white"]

# ============================================================================
# Test 6: Monochrome
# ============================================================================
test_monochrome:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: area
  height: 300
  style:
    theme:
      monochrome:
        enabled: true
        color: "#FF9900"
        shade_to: dark

# ============================================================================
# Test 7: Typography
# ============================================================================
test_typography:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: area
  height: 300
  style:
    typography:
      font_family: "Roboto, sans-serif"
      font_size: 14
    data_labels:
      show: true
      font_size: 12

# ============================================================================
# Test 8: Animation
# ============================================================================
test_animation:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: area
  height: 300
  style:
    animation:
      preset: lcars_dramatic

# ============================================================================
# Test 9: Advanced datasource
# ============================================================================
test_datasource:
  type: custom:lcards-chart
  data_sources:
    temp:
      entity: sensor.temperature
      window_seconds: 7200
      history:
        preload: true
        hours: 2
  source: temp
  chart_type: area
  height: 400
  style:
    formatters:
      tooltip: "{x|ddd MMM DD HH:mm}: {y}°C"

# ============================================================================
# Test 10: Complete nested
# ============================================================================
test_complete:
  type: custom:lcards-chart
  source: sensor.temperature
  chart_type: area
  height: 400
  style:
    colors:
      series: ["#FF9900"]
      stroke: ["#FF9900"]
      fill: ["rgba(255, 153, 0, 0.2)"]
      grid: "rgba(255, 255, 255, 0.1)"
      axis:
        x: "#FFCC00"
        y: "#FF9900"
    stroke:
      width: 2
      curve: smooth
    fill:
      type: gradient
      opacity: 0.5
    markers:
      size: 4
      shape: circle
    grid:
      show: true
      opacity: 0.3
    legend:
      show: true
      position: bottom
    typography:
      font_family: "Antonio, sans-serif"
      font_size: 12
    display:
      toolbar: false
      tooltip:
        show: true
        theme: dark
    animation:
      preset: lcars_standard
    formatters:
      xaxis_label: "HH:mm"
      yaxis_label: "{value}°C"
      tooltip: "{x|MMM DD HH:mm}: {y}°C"
