## Test Config 4: MSD with Debug Enabled

```yaml
type: custom:lcards-msd
id: test_msd_debug
name: MSD Debug Test
msd:
  base_svg:
    builtin: ncc-1701-a
  view_box: [0, 0, 1920, 1200]
  debug:
    enabled: true
    anchors: true
    bounding_boxes: true
    line_paths: true
  anchors:
    warp_core: [960, 600]
    bridge: [960, 200]
  overlays:
    - id: warp_status
      type: control
      position: [100, 100]
      size: [200, 60]
      card:
        type: custom:lcards-button
        entity: sensor.time
        name: Warp Core
    - id: warp_line
      type: line
      source:
        anchor: warp_core
      target:
        overlay: warp_status
        attachment: right
      style:
        stroke: cyan
        stroke_width: 2
```

**Purpose**: Test debug visualization in preview
**Expected**: Preview shows debug overlays (anchor markers, bounding boxes)

