# MSD Editor Phase 1 - Test Configurations

## Test Config 1: Basic MSD with Builtin SVG

```yaml
type: custom:lcards-msd
id: test_msd_basic
name: Basic MSD Test
msd:
  base_svg:
    builtin: ncc-1701-a
  view_box: [0, 0, 1920, 1200]
  anchors:
    warp_core: [960, 600]
    bridge: [960, 200]
    engineering: [500, 800]
    sickbay: [1400, 800]
  overlays:
    - id: warp_status
      type: control
      position: [100, 100]
      size: [200, 60]
      card:
        type: custom:lcards-button
        entity: sensor.time
        name: Warp Core
```

**Purpose**: Test basic editor loading with minimal config
**Expected**: Editor opens, metadata shows 1 control, 0 lines, 4 anchors

---

## Test Config 2: MSD with Controls and Lines

```yaml
type: custom:lcards-msd
id: test_msd_complex
name: Complex MSD Test
msd:
  base_svg:
    builtin: ncc-1701-a
  view_box: [0, 0, 1920, 1200]
  anchors:
    warp_core: [960, 600]
    bridge: [960, 200]
    engineering: [500, 800]
    sickbay: [1400, 800]
    transporter: [1200, 400]
  overlays:
    # Control Overlays
    - id: warp_status
      type: control
      position: [100, 100]
      size: [200, 60]
      card:
        type: custom:lcards-button
        entity: sensor.time
        name: Warp Core
        
    - id: bridge_status
      type: control
      position: [800, 50]
      size: [180, 50]
      card:
        type: custom:lcards-button
        entity: sensor.date
        name: Bridge
        
    - id: engineering_status
      type: control
      position: [400, 750]
      size: [200, 60]
      card:
        type: custom:lcards-button
        entity: binary_sensor.workday_sensor
        name: Engineering
        
    # Line Overlays
    - id: warp_to_bridge
      type: line
      source:
        anchor: warp_core
      target:
        overlay: bridge_status
        attachment: bottom
      style:
        stroke: cyan
        stroke_width: 2
        
    - id: bridge_to_engineering
      type: line
      source:
        overlay: bridge_status
        attachment: bottom-left
      target:
        anchor: engineering
      style:
        stroke: orange
        stroke_width: 2
```

**Purpose**: Test editor with multiple overlays
**Expected**: Metadata shows 3 controls, 2 lines, 5 anchors

