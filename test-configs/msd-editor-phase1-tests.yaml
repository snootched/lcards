## Installation Instructions

1. **Copy test config to clipboard**
2. **In Home Assistant:**
   - Open dashboard in edit mode
   - Add new card → Manual card
   - Paste YAML
   - Save
3. **Edit the card** to open visual editor
4. **Click "Open Configuration Studio"**

## Testing Workflow

For each test config:

1. ✅ Editor opens successfully
2. ✅ Metadata summary shows correct counts
3. ✅ Studio dialog opens on button click
4. ✅ Preview renders (or shows empty state)
5. ✅ Mode toolbar functional
6. ✅ Tab navigation works
7. ✅ Save/Cancel/Reset buttons work
8. ✅ No console errors

## Troubleshooting

### Editor doesn't appear
- Check browser console for errors
- Verify `lcards.js` is loaded (Network tab)
- Clear browser cache and hard refresh

### Studio doesn't open
- Check console for "MSDStudio" errors
- Verify `lcards-msd-studio-dialog.js` imported
- Check if dialog element appended to body

### Preview shows error
- Verify MSD card works standalone (outside editor)
- Check if base_svg path/builtin is valid
- Verify HASS object available

### Styles look wrong
- Verify CSS custom properties available
- Check if editor-styles.js loaded
- Test in different HA themes

## Expected Console Logs

When opening studio, you should see:
```
[LCARdSMSDEditor] Opening MSD Configuration Studio
[MSDStudio] Initialized
[MSDStudio] Opened with config: {...}
[MSDLivePreview] Preview updated (debounced)
```

When switching modes:
```
[MSDStudio] Mode changed: place_anchor
```

When switching tabs:
```
[MSDStudio] Tab changed: controls
```

