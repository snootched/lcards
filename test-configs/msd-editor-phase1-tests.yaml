## Test Config 5: MSD with Routing Channels (Phase 5 Preview)

```yaml
type: custom:lcards-msd
id: test_msd_channels
name: MSD Channels Test
msd:
  base_svg:
    builtin: ncc-1701-a
  view_box: [0, 0, 1920, 1200]
  anchors:
    warp_core: [960, 600]
    bridge: [960, 200]
  routing_channels:
    - id: primary_corridor
      type: bundling
      bounds: [800, 300, 400, 100]
      priority: 1
    - id: avoid_zone
      type: avoiding
      bounds: [600, 500, 200, 150]
      priority: 2
  overlays:
    - id: warp_status
      type: control
      position: [100, 100]
      size: [200, 60]
      card:
        type: custom:lcards-button
        entity: sensor.time
        name: Warp Core
```

**Purpose**: Test with routing channels (for future Phase 5)
**Expected**: Editor loads, preview renders (channels not visualized yet)

