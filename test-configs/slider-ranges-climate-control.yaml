# Climate thermostat with controllable range and wider display range
# Tests: control range subset of display range, ranges with control overlay
type: custom:lcards-slider
entity: climate.living_room
preset: gauge-basic

control:
  min: 16
  max: 28
  step: 0.5
  attribute: temperature

style:
  track:
    display:
      min: 10
      max: 35
      unit: '°C'
  
  ranges:
    - min: 10
      max: 18
      color: '#4488ff'
      label: 'Too Cold'
      opacity: 0.4
    - min: 18
      max: 24
      color: '#44ff88'
      label: 'Comfort Zone'
      opacity: 0.4
    - min: 24
      max: 35
      color: '#ff8844'
      label: 'Too Hot'
      opacity: 0.4
  
  gauge:
    scale:
      tick_marks:
        major:
          interval: 5
      labels:
        enabled: true
