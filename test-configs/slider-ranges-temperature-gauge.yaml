# Temperature gauge with 5 color-coded ranges
# Tests: gauge mode, horizontal orientation, multiple ranges, custom opacity
type: custom:lcards-slider
entity: sensor.outdoor_temperature
preset: gauge-basic

control:
  locked: true

style:
  track:
    display:
      min: -20
      max: 60
      unit: '°C'
    orientation: horizontal
  
  ranges:
    - min: -20
      max: 0
      color: 'var(--info-color)'
      label: 'Freezing'
      opacity: 0.35
    - min: 0
      max: 15
      color: 'var(--primary-color)'
      label: 'Cold'
      opacity: 0.35
    - min: 15
      max: 25
      color: 'var(--success-color)'
      label: 'Comfortable'
      opacity: 0.35
    - min: 25
      max: 35
      color: 'var(--warning-color)'
      label: 'Hot'
      opacity: 0.35
    - min: 35
      max: 60
      color: 'var(--error-color)'
      label: 'Extreme'
      opacity: 0.35
  
  gauge:
    scale:
      tick_marks:
        major:
          interval: 10
      labels:
        enabled: true
