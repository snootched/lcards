# Phase 3: Unified Template System Test Configuration

type: vertical-stack
cards:
  # Test 1: SimpleCard with datasource (new syntax)
  - type: custom:lcards
    card_type: button
    card_name: button-with-datasource
    entity: sensor.test_sensor
    label_top: "Temperature"
    label_bottom: "{datasource:sensor.temp:.1f}°C"
    styles:
      shape: rounded-short

  # Test 2: SimpleCard with mixed templates
  - type: custom:lcards
    card_type: button
    card_name: button-mixed
    entity: sensor.test_sensor
    label_top: "JS: [[[return 'Test']]]"
    label_main: "Token: {entity.state}"
    label_bottom: "Jinja: {{now().hour}}:{{now().minute}}"
    styles:
      shape: rounded-short

  # Test 3: SimpleCard with datasource + Jinja2
  - type: custom:lcards
    card_type: button
    card_name: button-datasource-jinja
    entity: sensor.test_sensor
    label_top: "{datasource:sensor.temp}°C"
    label_bottom: "At {{now().strftime('%H:%M')}}"
    styles:
      shape: rounded-short

  # Test 4: SimpleCard with all template types
  - type: custom:lcards
    card_type: button
    card_name: simple-all-templates
    entity: sensor.test_sensor
    label_top: "[[[return 'Computed']]]"
    label_main: "{entity.attributes.friendly_name}"
    label_side: "{datasource:sensor.temp:.1f}"
    label_bottom: "{{states('sensor.test_sensor') | upper}}"
    styles:
      shape: rounded-short

  # Test 5: Legacy MSD datasource (backward compatibility)
  - type: custom:lcards
    card_type: button
    card_name: simple-legacy-datasource
    entity: sensor.test_sensor
    label_top: "Legacy Syntax"
    label_bottom: "{sensor.temp:.1f}°C"
    styles:
      shape: rounded-short

  # Test 6: Tokens that should NOT conflict with datasources
  - type: custom:lcards
    card_type: button
    card_name: simple-tokens-not-datasource
    entity: sensor.test_sensor
    label_top: "{entity.state}"
    label_main: "{entity.attributes.unit_of_measurement}"
    label_bottom: "{entity.attributes.friendly_name}"
    styles:
      shape: rounded-short

  # Test 7: Explicit datasource prefix in various formats
  - type: custom:lcards
    card_type: button
    card_name: button-datasource-formats
    entity: sensor.test_sensor
    label_top: "{datasource:sensor.temp}"
    label_main: "{datasource:sensor.temp:.2f}"
    label_bottom: "{datasource:sensor.temp.transformations.celsius}"
    styles:
      shape: rounded-short

  # Test 8: Jinja2 with datasource reference
  - type: custom:lcards
    card_type: button
    card_name: simple-jinja-datasource-combo
    entity: sensor.test_sensor
    label_top: "{% if {datasource:sensor.temp} > 20 %}Hot{% else %}Cold{% endif %}"
    label_bottom: "{{states('sensor.test_sensor')}}"
    styles:
      shape: rounded-short

  # Test 9: Complex mixed template
  - type: custom:lcards
    card_type: button
    card_name: simple-complex-mixed
    entity: sensor.test_sensor
    label_top: "[[[return 'Status']]]"
    label_main: "{entity.state} at {{now().strftime('%H:%M')}}"
    label_bottom: "DS: {datasource:sensor.temp:.1f}, Legacy: {sensor.humidity:.0f}%"
    styles:
      shape: rounded-short

  # Test 10: Edge case - braces everywhere
  - type: custom:lcards
    card_type: button
    card_name: simple-edge-case-braces
    entity: sensor.test_sensor
    label_top: "{{ '{' + 'braces' + '}' }}"
    label_main: "{entity.state}"
    label_bottom: "{datasource:sensor.temp}"
    styles:
      shape: rounded-short
